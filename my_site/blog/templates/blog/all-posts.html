{% extends "base.html" %}
{% load static %}

{% block  title %}
    All my posts
{% endblock  %}

{% block css_files %}
    <link rel="stylesheet" href="{% static 'blog/post.css' %}">
    <link rel="stylesheet" href="{% static 'blog/all-posts.css' %}">
    <link rel="stylesheet" href="{% static 'blog/post_details.css' %}">
{% endblock  %}

{% block content %}
    <section id="all-posts">
         <a href="{% url 'starting-page' %}">
                <h2>InnoCent's BLOG</h2>
            </a>

        <ul>
            {% for post in all_posts %}
                {% include "blog/includes/post.html" %}
            {% endfor %}
            
        </ul>
    </section>
{% endblock%}
