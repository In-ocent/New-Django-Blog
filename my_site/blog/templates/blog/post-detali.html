{% extends "base.html" %}
{% load static %}

{% block title %}
    {{poast.title}}
{% endblock  %}

{% block css_files %}
    <link rel="stylesheet" href="{% static 'blog/post.css' %}">
    
{% endblock  %}


{% block content %}
    <section id="summary"  class="post">
        <h2 class="title">{{post.title}}</h2>
        <article>
            <img src="{% static 'blog/images/'|add:post.image_name %}" alt="{{post.title}}">
            <address>{{poast.authour}}</address>
            <div>Last updated on <time datetime="">{{post.date|date:"d M Y"}}</time></div>
        </article>
    </section>

    <main>
        {{post.content}}
    </main>
{% endblock  %}
